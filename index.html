<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipotéticamente hablando...</title>
    <!-- Fuentes elegantes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d81b60; /* Rosa oscuro/magenta */
            --primary-hover: #ad144b;
            --bg-gradient-start: #ffebee; /* Rosa muy pálido */
            --bg-gradient-end: #fce4ec;
            --text-main: #333333;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            min-height: 400px; /* Mantiene el tamaño de la tarjeta estable */
        }

        /* Tipografía */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        /* Estilos de las secciones para animaciones */
        .step {
            position: absolute;
            top: 3rem;
            left: 2rem;
            right: 2rem;
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .step.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
            position: relative;
            top: 0;
            left: 0;
            right: 0;
        }

        /* Inputs y Formularios */
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: #fafafa;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.1);
            background: #fff;
        }

        /* Botones */
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.3);
            width: 100%;
            margin-top: 1rem;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.4);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Botones de opciones (Naturales/Eternas) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .option-btn {
            background-color: white;
            color: var(--text-main);
            border: 2px solid #eee;
            padding: 20px 10px;
            border-radius: 15px;
            font-size: 1.1rem;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .option-btn span {
            font-size: 2rem;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background-color: #fff0f5;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* Ocultar elementos visualmente para lógica JS */
        .visually-hidden {
            display: none;
        }

        /* Ajustes Móviles */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }
            .container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Reemplaza "TU_ID_DE_FORMSPREE" con el endpoint real que te dé Formspree -->
        <form id="flowerForm" action="https://formspree.io/f/TU_ID_DE_FORMSPREE" method="POST">
            
            <!-- SECCIÓN 1: Nombre -->
            <div id="step1" class="step active">
                <h1>Hipotéticamente hablando...</h1>
                <p style="margin-bottom: 2rem; color: #666; font-size: 0.9rem;">(Solo por curiosidad científica)</p>
                
                <div class="input-group">
                    <label for="nombre">Para empezar, ¿cuál es tu nombre?</label>
                    <input type="text" id="nombre" name="Nombre" placeholder="Tu nombre aquí..." autocomplete="off">
                </div>
                <button type="button" id="btnNext1" disabled>Continuar</button>
            </div>

            <!-- SECCIÓN 2: Tipo de Flor -->
            <div id="step2" class="step">
                <h2>¿Qué tipo de flores prefieres?</h2>
                <!-- Input oculto para guardar la elección y mandarla por correo -->
                <input type="hidden" id="tipoFlor" name="Tipo_de_Flor" value="">
                
                <div class="options-grid">
                    <button type="button" class="option-btn" onclick="selectType('Naturales')">
                        <span>🌷</span>
                        Naturales
                    </button>
                    <button type="button" class="option-btn" onclick="selectType('Eternas')">
                        <span>🌹</span>
                        Eternas
                    </button>
                </div>
            </div>

            <!-- SECCIÓN 3: Detalles -->
            <div id="step3" class="step">
                <h2>Casi terminamos...</h2>
                <p style="margin-bottom: 1.5rem; color: #666; font-size: 0.9rem;" id="nameDisplay">Cuéntame más sobre tus gustos.</p>
                
                <div class="input-group">
                    <label for="floresFavoritas">¿Cuáles son tus flores favoritas?</label>
                    <input type="text" id="floresFavoritas" name="Flores_Favoritas" placeholder="Ej. Girasoles, Tulipanes, Rosas..." required>
                </div>
                
                <div class="input-group">
                    <label for="colorFavorito">¿De qué color te gustan?</label>
                    <input type="text" id="colorFavorito" name="Color_Favorito" placeholder="Ej. Amarillo, Rojo pasión, Blanco..." required>
                </div>
                
                <button type="submit" id="btnSubmit">Enviar respuestas</button>
            </div>

        </form>
    </div>

    <script>
        // Elementos del DOM
        const inputNombre = document.getElementById('nombre');
        const btnNext1 = document.getElementById('btnNext1');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const inputTipoFlor = document.getElementById('tipoFlor');
        const nameDisplay = document.getElementById('nameDisplay');

        // Lógica Paso 1: Habilitar el botón solo si hay texto
        inputNombre.addEventListener('input', () => {
            if (inputNombre.value.trim().length > 1) {
                btnNext1.removeAttribute('disabled');
            } else {
                btnNext1.setAttribute('disabled', 'true');
            }
        });

        // Transición de Paso 1 a Paso 2
        btnNext1.addEventListener('click', () => {
            step1.classList.remove('active');
            // Pequeño retraso para que se note la animación de salida antes de entrar
            setTimeout(() => {
                step2.classList.add('active');
            }, 300);
        });

        // Lógica Paso 2: Seleccionar tipo y pasar al Paso 3
        function selectType(tipo) {
            // Guardamos la respuesta en el input oculto para el correo
            inputTipoFlor.value = tipo;
            
            // Personalizamos el texto del paso 3 con el nombre ingresado
            const nombre = inputNombre.value.trim();
            nameDisplay.textContent = `Excelente elección, ${nombre}. Ahora dime...`;

            // Transición
            step2.classList.remove('active');
            setTimeout(() => {
                step3.classList.add('active');
            }, 300);
        }

        // Lógica final (Opcional): Cambiar texto del botón al enviar
        document.getElementById('flowerForm').addEventListener('submit', function() {
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.textContent = "Enviando... ✨";
            btnSubmit.style.opacity = "0.8";
            btnSubmit.setAttribute('disabled', 'true');
        });
    </script>
</body>
</html>
